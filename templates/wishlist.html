<!DOCTYPE html>
<html>
<head>
    <title>Wishlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='wishlist.css') }}">

    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!--nav bar-->
  <!-- Desktop Navbar -->
<nav class="navbar desktop-navbar">
  <div class="navbar-left">
    <div class="logo-circle">2MB</div>
    <span class="brand-name">Computer</span>
  </div>

  <ul class="navbar-center">
    <li class="active"><a href="{{ url_for('home') }}"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="{{ url_for('sell_bp.sell_page') }}"><i class="fa-solid fa-tag"></i> Sell</a></li>
    <li><a href="{{ url_for('repair_bp.repair_page') }}"><i class="fa-solid fa-screwdriver-wrench"></i> Repair</a></li>
    <li><a href="{{ url_for('myorders.order_page') }}"><i class="fa-solid fa-box"></i> My Order</a></li>
    <li><a href="{{ url_for('profile') }}"><i class="fa-solid fa-user"></i> Me</a></li>
  </ul>

  <div class="navbar-right">
    <a href="{{ url_for('cart') }}"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="{{ url_for('wishlist_bp.wishlist_page') }}"><i class="fa-regular fa-heart"></i></a>
  </div>
</nav>
<!-- Mobile Top Bar -->
<nav class="mobile-topbar">
  <div class="mobile-left">
    <div class="logo-circle">2MB</div>
    <span class="brand-name">Computer</span>
  </div>

  <div class="mobile-right">
    <a href="{{ url_for('cart') }}"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="{{ url_for('wishlist_bp.wishlist_page') }}"><i class="fa-regular fa-heart"></i></a>
  </div>
</nav>

<nav class="mobile-bottom-nav">
  <a href="{{ url_for('home') }}" class="nav-item active">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="{{ url_for('sell_bp.sell_page') }}" class="nav-item">
    <i class="fa-solid fa-tag"></i>
    <span>Sell</span>
  </a>
  <a href="{{ url_for('repair_bp.repair_page') }}" class="nav-item">
    <i class="fa-solid fa-screwdriver-wrench"></i>
    <span>Repair</span>
  </a>
  <a href="{{ url_for('myorders.order_page') }}" class="nav-item">
    <i class="fa-solid fa-box"></i>
    <span>Orders</span>
  </a>
  <a href="{{ url_for('profile') }}" class="nav-item">
    <i class="fa-solid fa-user"></i>
    <span>Me</span>
  </a>
</nav>

<div class="wishlist-container">
  <div class="wishlist-header">
    <h2 class="heading" >My Wishlist</h2>
    <button id="clearBtn" class="clear-btn" style="display:none;">Clear All</button>
  </div>

  <div id="wishlistProducts" class="product-container">
    <!-- Wishlist items will be loaded here dynamically -->
</div>

  <div id="emptyState" class="empty-state" style="display:none;">
    <i class="fas fa-heart"></i>
    <p>Your wishlist is empty</p>
    <a href="{{ url_for('home') }}" class="browse-btn">Browse Products</a>
  </div>
</div>

<script src="{{ url_for('static', filename='wishlist-sync.js') }}"></script>
<script src="{{ url_for('static', filename='wishlist.js') }}"></script>
</body>
</html>
