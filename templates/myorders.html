<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - 2 MB Computers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='myorders.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- ═══════════════════════════════ DESKTOP NAVBAR ═════════════════════════════ -->
<nav class="navbar desktop-navbar">
  <div class="navbar-left">
    <div class="logo-circle">2MB</div>
    <span class="brand-name">Computer</span>
  </div>

  <ul class="navbar-center">
    <li><a href="{{ url_for('home') }}"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="{{ url_for('sell_bp.sell_page') }}"><i class="fa-solid fa-tag"></i> Sell</a></li>
    <li><a href="{{ url_for('repair_bp.repair_page') }}"><i class="fa-solid fa-screwdriver-wrench"></i> Repair</a></li>
    <li><a href="{{ url_for('myorders.order_page') }}"><i class="fa-solid fa-box"></i> My Order</a></li>
    <li><a href="{{ url_for('profile') }}"><i class="fa-solid fa-user"></i> Me</a></li>
  </ul>

  <div class="navbar-right">
    <span class="nav-username" id="navUserName">{{ user.name if user else '' }}</span>
    <a href="{{ url_for('cart') }}"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="{{ url_for('wishlist') }}"><i class="fa-regular fa-heart"></i></a>
  </div>
</nav>

<!-- ═══════════════════════════════ MOBILE TOP BAR ════════════════════════════ -->
<nav class="mobile-topbar">
  <div class="mobile-left">
    <div class="logo-circle">2MB</div>
    <span class="brand-name">Computer</span>
  </div>
  <div class="mobile-right">
    <a href="{{ url_for('cart') }}" style="position:relative;">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="badge-dot" id="bagCountMobile">0</span>
    </a>
    <a href="{{ url_for('wishlist') }}"><i class="fa-regular fa-heart"></i></a>
  </div>
</nav>

<!-- ═══════════════════════════════ MOBILE BOTTOM NAV ════════════════════════ -->
<nav class="mobile-bottom-nav">
  <a href="{{ url_for('home') }}" class="nav-item">
    <i class="fa-solid fa-house"></i><span>Home</span>
  </a>
  <a href="{{ url_for('sell_bp.sell_page') }}" class="nav-item">
    <i class="fa-solid fa-tag"></i><span>Sell</span>
  </a>
  <a href="{{ url_for('repair_bp.repair_page') }}" class="nav-item">
    <i class="fa-solid fa-screwdriver-wrench"></i><span>Repair</span>
  </a>
  <a href="{{ url_for('myorders.order_page') }}" class="nav-item">
    <i class="fa-solid fa-box"></i><span>Orders</span>
  </a>
  <a href="{{ url_for('profile') }}" class="nav-item">
    <i class="fa-solid fa-user"></i><span>Me</span>
  </a>
</nav>

<!-- ── Page Content ───────────────────────────────────────────────────────── -->
<div class="page-wrapper">
    <div class="orders-container">
        <h1 class="page-title">
            <i class="fas fa-shopping-bag" style="color:#2563eb; margin-right:10px;"></i>My Orders
        </h1>

        <div id="loading" class="loading-message">
            <i class="fas fa-spinner fa-spin"></i> Loading your orders…
        </div>

        <div id="orders-list"></div>

        <div id="no-orders" style="display:none; text-align:center; padding:60px 20px; color:#64748b;">
            <i class="fas fa-box-open" style="font-size:56px; color:#cbd5e1; display:block; margin-bottom:16px;"></i>
            <p style="font-size:18px; font-weight:600; margin-bottom:8px;">No orders yet!</p>
            <p style="font-size:14px; margin-bottom:24px;">Looks like you haven't placed any orders.</p>
            <a href="/products" class="btn-shop-now">Shop Now</a>
        </div>
    </div>
</div>

<!-- ── Confirm Modal ──────────────────────────────────────────────────────── -->
<div class="custom-modal" id="confirmModal">
    <div class="modal-box">
        <h3 id="modalTitle">Confirm</h3>
        <p id="modalText">Are you sure?</p>
        <div class="modal-actions">
            <button id="modalBtnYes" class="btn-track"  style="min-width:100px;">Yes</button>
            <button id="modalBtnNo"  class="btn-cancel" style="min-width:100px;">No</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    // Hamburger toggle
    document.getElementById('navHamburger').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('open');
    });
</script>
<script src="{{ url_for('static', filename='myorders.js') }}"></script>
</body>
</html>
