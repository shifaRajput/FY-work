<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin_dashboard.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin_orders.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* Embedded Banner CSS */
        .admin-header-banner { background: linear-gradient(135deg, #2b6cff 0%, #1d4ed8 100%); color: white; padding: 30px 32px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 4px 15px rgba(43, 108, 255, 0.2); }
        .admin-header-banner h1 { margin: 0 0 8px 0; font-size: 28px; color: white; }
        .admin-header-banner p { margin: 0; font-size: 15px; opacity: 0.9; }
        
        /* Reset old order container margin so it fits the new dashboard */
        .orders-container { max-width: 100%; margin: 0; box-shadow: none; background: transparent; padding: 0;}
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header-banner">
        <h1>Hi, Admin Amjad  👋</h1>
        <p>Welcome back! Manage your store orders here.</p>
    </div>

    <div class="admin-nav">
        <a href="/admin/analytics" class="admin-nav-item" style="text-decoration: none;"><i class="fa-solid fa-chart-line"></i> Analytics</a>
        <a href="/admin/add" class="admin-nav-item" style="text-decoration: none;"><i class="fa-solid fa-box"></i> Products</a>
        <a href="/admin/orders" class="admin-nav-item active" style="text-decoration: none;"><i class="fa-solid fa-shopping-bag"></i> Orders</a>
        <a href="/admin/sell" class="admin-nav-item" style="text-decoration: none;"><i class="fa-solid fa-tag"></i> Sell</a>
        <a href="/admin/repairs" class="admin-nav-item" style="text-decoration: none;"><i class="fa-solid fa-screwdriver-wrench"></i> Repairs</a>
        <a href="/admin/help" class="admin-nav-item" style="text-decoration: none;"><i class="fa-solid fa-circle-question"></i> Help?</a>
    </div>

    <div class="admin-content">
        <div class="orders-container">
            <h2 style="color: #111827; margin-top: 0;">Active Orders</h2>
            
            <div id="loading" class="loading-message" style="display: none;">
                Loading data or unable to connect...
            </div>

            <div id="no-orders" class="empty-box" style="display: none;">
                <h3>No Active Orders</h3>
                <p>There are currently no orders placed.</p>
            </div>

            <div id="admin-orders-list"></div>
        </div>
    </div>
</div>

<div id="custom-modal" class="custom-modal">
    <div class="modal-box">
        <h3>Update Tracking Status</h3>
        <p id="modal-message">Advance this order to the next stage?</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-track" id="confirm-advance-btn">Update</button>
        </div>
    </div>
</div>

<script src="/admin_orders.js"></script>
</body>
</html>
