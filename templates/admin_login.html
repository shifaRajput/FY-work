<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #4084f0; --medium-blue-card: #4f94e4; --input-bg: rgba(255, 255, 255, 0.2); --text-white: #ffffff; --black-board: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f5f7fb; }
        .admin-wrapper { width: 400px; }
        .login-card { background: var(--medium-blue-card); padding: 60px 45px 40px 45px; border-radius: 24px; text-align: center; border: 2px solid var(--black-board); }
        .profile-circle { width: 90px; height: 90px; background: #ffffff; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: -105px auto 30px; border-bottom: 8px solid var(--black-board); }
        .profile-circle i { font-size: 40px; color: var(--medium-blue-card); }
        .login-card h2 { color: var(--text-white); margin-bottom: 25px; font-weight: 700; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i:first-child { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.8); }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.8); cursor: pointer; }
        .input-group input { width: 100%; padding: 14px 45px; background: var(--input-bg); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; outline: none; color: white; font-size: 15px; }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.7); }
        .login-btn { width: 100%; padding: 14px; background: #ffffff; color: var(--medium-blue-card); border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-btn:hover { background: #f0f7ff; transform: translateY(-2px); }
        .forgot-link { display: block; color: white; margin-bottom: 15px; text-decoration: none; font-size: 14px; cursor: pointer; }
        .forgot-link:hover { text-decoration: underline; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 2px solid var(--black-board); }
        .modal-content h3 { color: var(--medium-blue-card); margin-bottom: 20px; }
        .modal-content .input-group input { background: #f5f7fb; color: black; border: 1px solid #ccc; }
        .modal-content .input-group input::placeholder { color: #888; }
        .modal-content .input-group i:first-child { color: var(--medium-blue-card); }
        .close-btn { margin-top: 10px; background: #ccc; color: black; width: 100%; padding: 10px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .close-btn:hover { background: #bbb; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="login-card">
            <div class="profile-circle"><i class="fa-solid fa-user-shield"></i></div>
            <h2>ADMIN LOGIN</h2>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="username" placeholder="Email / Username" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye-slash toggle-password" id="togglePassword"></i>
                </div>
                <a class="forgot-link" onclick="openModal()">Forgot Password?</a>
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
        <center><p style="color:#64748b; margin-top:15px; font-weight:bold;">Authorized Personnel Only</p></center>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <h3>Reset Password</h3>
            <form id="forgotForm">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="forgotEmail" placeholder="Admin Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="forgotPin" placeholder="Recovery PIN (12345)" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="forgotNewPass" placeholder="New Password" required>
                </div>
                <button type="submit" class="login-btn" style="background: var(--medium-blue-card); color: white;">RESET PASSWORD</button>
                <button type="button" class="close-btn" onclick="closeModal()">CANCEL</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin_login.js') }}"></script>
</body>
</html>
