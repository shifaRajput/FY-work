<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Requests - Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_dashboard.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_sell.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-container">

  <div class="admin-header-banner">
    <h1>Hi, Admin Amjad 👋</h1>
    <p>Welcome back! Manage your customer sell requests here.</p>
  </div>

  <div class="admin-nav">
    <a href="/admin/analytics"  class="admin-nav-item" style="text-decoration:none;"><i class="fa-solid fa-chart-line"></i> Analytics</a>
    <a href="/admin/add"        class="admin-nav-item" style="text-decoration:none;"><i class="fa-solid fa-box"></i> Products</a>
    <a href="/admin/orders"     class="admin-nav-item" style="text-decoration:none;"><i class="fa-solid fa-shopping-bag"></i> Orders</a>
    <a href="/admin/sell"       class="admin-nav-item active" style="text-decoration:none;"><i class="fa-solid fa-tag"></i> Sell</a>
    <a href="/admin/repairs"    class="admin-nav-item" style="text-decoration:none;"><i class="fa-solid fa-screwdriver-wrench"></i> Repairs</a>
    <a href="/admin/help"       class="admin-nav-item" style="text-decoration:none;"><i class="fa-solid fa-circle-question"></i> Help?</a>
  </div>

  <div class="admin-content">
    <div class="card">
      <h2 style="margin-top:0; color:#111827; margin-bottom:20px;">
        Sell Requests
        <span id="requestCount" style="font-size:14px;color:#94a3b8;font-weight:400;margin-left:10px;"></span>
      </h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Category</th>
            <th>Brand / Model</th>
            <th>Price</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
            <th>View</th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
          <tr><td colspan="9" class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Detail Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Sell Request Details</h2>
      <span class="close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body">
      <div class="image-section">
        <div class="main-img-container">
          <img id="mainImage" src="" alt="Device Photo">
        </div>
        <div class="thumb-list" id="thumbnailContainer"></div>
      </div>
      <div class="info-section" id="modalInfo"></div>
    </div>
    <!-- Contact button row -->
    <div class="modal-footer">
      <button class="btn contact" id="modalContactBtn" onclick="contactCustomer()">
        <i class="fa-solid fa-envelope"></i> Contact Customer
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toastBox" class="toast-notification">
  <i class="fa-solid fa-bell"></i>
  <span id="toastMessage">Status updated!</span>
</div>

<script src="{{ url_for('static', filename='admin_sell.js') }}"></script>
</body>
</html>
